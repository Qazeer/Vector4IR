# Description: Process Exchange IIS logs.
#              Exchange IIS logs will contain HTTP (GET & POST) requests to the various Exchange HTTP services (OWA, ECP, etc.), as well as access to potential webshell.
#              Default path on disk: %SystemDrive%\inetpub\logs\LogFiles\W3SVC(1|2)
#              Expected fields format: date time s-ip cs-method cs-uri-stem cs-uri-query s-port cs-username c-ip cs(User-Agent) cs(Referer) sc-status sc-substatus sc-win32-status time-taken
#              Filename should match: "W3SVC(1|2)/*ex*.log"
#              source = "exchange_iis" & sourcetype = "exchange_artefacts"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-01
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Exchange_IIS_log_input]
  type = "file"
  include = [
    "${INPUT_FOLDER:?The input folder containing the Exchange IIS W3SVC log files is required}/**/W3SVC1/*ex*.log",
    "${INPUT_FOLDER:?The input folder containing the Exchange IIS W3SVC log files is required}/**/W3SVC2/*ex*.log"
  ]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.Exchange_IIS_log_parser]
  type = "remap"
  inputs = ["Exchange_IIS_log_input"]
  source = '''
    # Expect CSV header:
    # #Fields: date time s-ip cs-method cs-uri-stem cs-uri-query s-port cs-username c-ip cs(User-Agent) cs(Referer) sc-status sc-substatus sc-win32-status time-taken
    # Validates that the log format matches the expected header.
    if starts_with(string!(.message), "#") {
      if starts_with(string!(.message), "#Fields") {
        expected_header = "#Fields: date time s-ip cs-method cs-uri-stem cs-uri-query s-port cs-username c-ip cs(User-Agent) cs(Referer) sc-status sc-substatus sc-win32-status time-taken"
        current_header = strip_whitespace(string!(.message))
        if expected_header != current_header {
          log("Unexpected CSV header, fields logged may be configured differently!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
        }
      }
      abort
    }

    fields, err = parse_csv(.message, delimiter: " ")
    if (err != null) {
      log("Unable to parse IIS W3C log line: " + err, level: "error")
    }

    .timestamp = to_string(fields[0]) + " " + to_string(fields[1])
    .s_ip = fields[2]
    .cs_method = fields[3]
    .cs_uri_stem = fields[4]
    .cs_uri_query = fields[5]
    .s_port = fields[6]
    .cs_username = fields[7]
    .c_ip = fields[8]
    .cs_user_agent = fields[9]
    .cs_referer = fields[10]
    .sc_status = fields[11]
    .sc_substatus = fields[12]
    .sc_win32_status = fields[13]
    .time_taken = fields[14]

    # Add the source host following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .c_ip
    .source = "exchange_iis"
    .sourcetype = "exchange_artefacts"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.Exchange_IIS_log_parser_coerce_to_sink]
  type = "remap"
  inputs = ["Exchange_IIS_log_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

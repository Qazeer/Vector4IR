# Vector_Mailservers_Exchange_OWA_HttpProxy_logs config.
# Description: Process Exchange OWA HttpProxy logs.
#                OWA HttpProxy logs contain client interactions with the Outlook Web Access (OWA) interface, which is a web interface for mailbox access and management (read / send / delete mails, etc.).
#                https://cyberpolygon.com/materials/okhota-na-ataki-ms-exchange-chast-1-proxylogon/
#                https://learn.microsoft.com/en-us/exchange/clients/outlook-on-the-web/outlook-on-the-web
#              Filename should match: "HttpProxy\Owa\HttpProxy_*.log"
#              Path %SystemDrive%/Program Files/Microsoft/Exchange Server/V15/Logging/HttpProxy/Owa
#              source = "exchange_owa_httpproxy" & sourcetype = "exchange_artefacts"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Exchange_OWA_HttpProxy_logs_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder matching the Exchange root install path is required.}/**/HttpProxy/Owa/HttpProxy_*.log"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.Exchange_OWA_HttpProxy_logs_parser]
  type = "remap"
  inputs = ["Exchange_OWA_HttpProxy_logs_input"]
  source = '''
    # Expect CSV header:
    # DateTime,RequestId,MajorVersion,MinorVersion,BuildVersion,RevisionVersion,ClientRequestId,Protocol,UrlHost,UrlStem,ProtocolAction,AuthenticationType,IsAuthenticated,AuthenticatedUser,Organization,AnchorMailbox,UserAgent,ClientIpAddress,ServerHostName,HttpStatus,BackEndStatus,ErrorCode,Method,ProxyAction,TargetServer,TargetServerVersion,RoutingType,RoutingHint,BackEndCookie,ServerLocatorHost,ServerLocatorLatency,RequestBytes,ResponseBytes,TargetOutstandingRequests,AuthModulePerfContext,HttpPipelineLatency,CalculateTargetBackEndLatency,GlsLatencyBreakup,TotalGlsLatency,AccountForestLatencyBreakup,TotalAccountForestLatency,ResourceForestLatencyBreakup,TotalResourceForestLatency,ADLatency,SharedCacheLatencyBreakup,TotalSharedCacheLatency,ActivityContextLifeTime,ModuleToHandlerSwitchingLatency,ClientReqStreamLatency,BackendReqInitLatency,BackendReqStreamLatency,BackendProcessingLatency,BackendRespInitLatency,BackendRespStreamLatency,ClientRespStreamLatency,KerberosAuthHeaderLatency,HandlerCompletionLatency,RequestHandlerLatency,HandlerToModuleSwitchingLatency,ProxyTime,CoreLatency,RoutingLatency,HttpProxyOverhead,TotalRequestTime,RouteRefresherLatency,UrlQuery,BackEndGenericInfo,GenericInfo,GenericErrors,EdgeTraceId,DatabaseGuid,UserADObjectGuid,PartitionEndpointLookupLatency,RoutingStatus
    if .__offset == 0 || starts_with(string!(.message), "#") {
      if starts_with(string!(.message), "#Fields:") {
        expected_header = "#Fields: DateTime,RequestId,MajorVersion,MinorVersion,BuildVersion,RevisionVersion,ClientRequestId,Protocol,UrlHost,UrlStem,ProtocolAction,AuthenticationType,IsAuthenticated,AuthenticatedUser,Organization,AnchorMailbox,UserAgent,ClientIpAddress,ServerHostName,HttpStatus,BackEndStatus,ErrorCode,Method,ProxyAction,TargetServer,TargetServerVersion,RoutingType,RoutingHint,BackEndCookie,ServerLocatorHost,ServerLocatorLatency,RequestBytes,ResponseBytes,TargetOutstandingRequests,AuthModulePerfContext,HttpPipelineLatency,CalculateTargetBackEndLatency,GlsLatencyBreakup,TotalGlsLatency,AccountForestLatencyBreakup,TotalAccountForestLatency,ResourceForestLatencyBreakup,TotalResourceForestLatency,ADLatency,SharedCacheLatencyBreakup,TotalSharedCacheLatency,ActivityContextLifeTime,ModuleToHandlerSwitchingLatency,ClientReqStreamLatency,BackendReqInitLatency,BackendReqStreamLatency,BackendProcessingLatency,BackendRespInitLatency,BackendRespStreamLatency,ClientRespStreamLatency,KerberosAuthHeaderLatency,HandlerCompletionLatency,RequestHandlerLatency,HandlerToModuleSwitchingLatency,ProxyTime,CoreLatency,RoutingLatency,HttpProxyOverhead,TotalRequestTime,RouteRefresherLatency,UrlQuery,BackEndGenericInfo,GenericInfo,GenericErrors,EdgeTraceId,DatabaseGuid,UserADObjectGuid,PartitionEndpointLookupLatency,RoutingStatus"
        current_header = strip_whitespace(string!(.message))
        if expected_header != current_header {
          log("Unexpected CSV header!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
        }
      }
      abort
    }

    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    .datetime = fields[0]
    .requestid = fields[1]
    .majorversion = fields[2]
    .minorversion = fields[3]
    .buildversion = fields[4]
    .revisionversion = fields[5]
    .clientrequestid = fields[6]
    .protocol = fields[7]
    .urlhost = fields[8]
    .urlstem = fields[9]
    .protocolaction = fields[10]
    .authenticationtype = fields[11]
    .isauthenticated = fields[12]
    .authenticateduser = fields[13]
    .organization = fields[14]
    .anchormailbox = fields[15]
    .useragent = fields[16]
    .clientipaddress = fields[17]
    .serverhostname = fields[18]
    .httpstatus = fields[19]
    .backendstatus = fields[20]
    .errorcode = fields[21]
    .method = fields[22]
    .proxyaction = fields[23]
    .targetserver = fields[24]
    .targetserverversion = fields[25]
    .routingtype = fields[26]
    .routinghint = fields[27]
    .backendcookie = fields[28]
    .serverlocatorhost = fields[29]
    .serverlocatorlatency = fields[30]
    .requestbytes = fields[31]
    .responsebytes = fields[32]
    .targetoutstandingrequests = fields[33]
    .authmoduleperfcontext = fields[34]
    .httppipelinelatency = fields[35]
    .calculatetargetbackendlatency = fields[36]
    .glslatencybreakup = fields[37]
    .totalglslatency = fields[38]
    .accountforestlatencybreakup = fields[39]
    .totalaccountforestlatency = fields[40]
    .resourceforestlatencybreakup = fields[41]
    .totalresourceforestlatency = fields[42]
    .adlatency = fields[43]
    .sharedcachelatencybreakup = fields[44]
    .totalsharedcachelatency = fields[45]
    .activitycontextlifetime = fields[46]
    .moduletohandlerswitchinglatency = fields[47]
    .clientreqstreamlatency = fields[48]
    .backendreqinitlatency = fields[49]
    .backendreqstreamlatency = fields[50]
    .backendprocessinglatency = fields[51]
    .backendrespinitlatency = fields[52]
    .backendrespstreamlatency = fields[53]
    .clientrespstreamlatency = fields[54]
    .kerberosauthheaderlatency = fields[55]
    .handlercompletionlatency = fields[56]
    .requesthandlerlatency = fields[57]
    .handlertomoduleswitchinglatency = fields[58]
    .proxytime = fields[59]
    .corelatency = fields[60]
    .routinglatency = fields[61]
    .httpproxyoverhead = fields[62]
    .totalrequesttime = fields[63]
    .routerefresherlatency = fields[64]
    .urlquery = fields[65]
    .backendgenericinfo = fields[66]
    .genericinfo = fields[67]
    .genericerrors = fields[68]
    .edgetraceid = fields[69]
    .databaseguid = fields[70]
    .useradobjectguid = fields[71]
    .partitionendpointlookuplatency = fields[72]
    .routingstatus = fields[73]

    .timestamp = .datetime
    if is_nullish(.timestamp) {
      log("Timestamp is null for event, defaulting to current time: " + string!(.message), level: "warn")
      .timestamp = now()
    }

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .serverhostname
    .source = "exchange_owa_httpproxy"
    .sourcetype = "exchange_artefacts"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.Exchange_OWA_HttpProxy_logs_coerce_to_sink]
  type = "remap"
  inputs = ["Exchange_OWA_HttpProxy_logs_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9])|Z)?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? to_timestamp(value_string) ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

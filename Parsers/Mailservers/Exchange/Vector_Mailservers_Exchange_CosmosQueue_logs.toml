# Vector_Mailservers_Exchange_CosmosQueue_logs config.
# Description: Process Exchange CosmosQueue logs.
#                CosmosQueue logs contain administration actions performed (New-Mailbox, Set-Mailbox, Database Availability Group operations, etc.).
#                https://m365internals.com/2022/10/07/hunting-in-on-premises-exchange-server-logs/
#              Filename should match: "CosmosQueue\audit*.log"
#              Path %SystemDrive%/Program Files/Microsoft/Exchange Server/V15/Logging/CosmosQueue/
#              source = "exchange_cosmosqueue" & sourcetype = "exchange_artefacts"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Exchange_CosmosQueue_logs_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder matching the Exchange root install path is required.}/**/CosmosQueue/audit*.log"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.Exchange_CosmosQueue_logs_parser]
  type = "remap"
  inputs = ["Exchange_CosmosQueue_logs_input"]
  source = '''
    # Expect CSV header:
    # Timestamp,Server,TenantId,RecordType,Data,UserKey,RecordId,Operation,Workload,ResultStatus,Version,Scope
    if .__offset == 0 || starts_with(string!(.message), "#") {
      if starts_with(string!(.message), "#Fields:") {
        expected_header = "#Fields: Timestamp,Server,TenantId,RecordType,Data,UserKey,RecordId,Operation,Workload,ResultStatus,Version,Scope"
        current_header = strip_whitespace(string!(.message))
        if expected_header != current_header {
          log("Unexpected CSV header!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
        }
      }
      abort
    }

    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    parsed_object = {}

    data_raw = fields[4]
    parsed_data, err = parse_json(data_raw)
    if err != null {
      log("Unable to parse JSON from the event's data field: " + err, level: "error")
      parsed_object.data_raw = data_raw
    } else {
      parsed_object = parsed_data
    }

    parsed_object.timestamp = fields[0]
    parsed_object.server = fields[1]
    parsed_object.tenantid = fields[2]
    parsed_object.recordtype = fields[3]
    parsed_object.userkey = fields[5]
    parsed_object.recordid = fields[6]
    parsed_object.operation = fields[7]
    parsed_object.workload = fields[8]
    parsed_object.resultstatus = fields[9]
    parsed_object.version = fields[10]
    parsed_object.scope = fields[11]

    . = parsed_object

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .serverhostname
    .source = "exchange_cosmosqueue"
    .sourcetype = "exchange_artefacts"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.Exchange_CosmosQueue_logs_coerce_to_sink]
  type = "remap"
  inputs = ["Exchange_CosmosQueue_logs_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9])|Z)?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%+") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

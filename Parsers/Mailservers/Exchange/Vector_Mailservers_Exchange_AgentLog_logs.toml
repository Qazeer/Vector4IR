# Vector_Mailservers_Exchange_AgentLog_logs config.
# Description: Process Exchange AgentLog logs.
#                AgentLog logs contain the actions performed on a message by specific Exchange anti-spam agents.
#                https://learn.microsoft.com/en-us/exchange/anti-spam-agent-logging-exchange-2013-help
#              Filename should match: "AgentLog\AgentLog*.log"
#              Path %SystemDrive%/Program Files/Microsoft/Exchange Server/V15/TransportRoles/Logs/FrontEnd/AgentLog
#              source = "exchange_agentlog" & sourcetype = "exchange_artefacts"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Exchange_AgentLog_logs_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder matching the Exchange root install path is required.}/**/AgentLog/AgentLog*.log"]
  # ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.Exchange_AgentLog_logs_parser]
  type = "remap"
  inputs = ["Exchange_AgentLog_logs_input"]
  source = '''
    # Expect CSV header:
    # Timestamp,SessionId,LocalEndpoint,RemoteEndpoint,EnteredOrgFromIP,MessageId,P1FromAddress,P2FromAddresses,Recipient,NumRecipients,Agent,Event,Action,SmtpResponse,Reason,ReasonData,Diagnostics,NetworkMsgID,TenantID,Directionality
    if .__offset == 0 || starts_with(string!(.message), "#") {
      if starts_with(string!(.message), "#Fields:") {
        expected_header = "#Fields: Timestamp,SessionId,LocalEndpoint,RemoteEndpoint,EnteredOrgFromIP,MessageId,P1FromAddress,P2FromAddresses,Recipient,NumRecipients,Agent,Event,Action,SmtpResponse,Reason,ReasonData,Diagnostics,NetworkMsgID,TenantID,Directionality"
        current_header = strip_whitespace(string!(.message))
        if expected_header != current_header {
          log("Unexpected CSV header!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
        }
      }
      abort
    }

    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    .timestamp = fields[0]
    .sessionid = fields[1]
    .localendpoint = fields[2]
    .remoteendpoint = fields[3]
    .enteredorgfromip = fields[4]
    .messageid = fields[5]
    .p1fromaddress = fields[6]
    .p2fromaddresses = fields[7]
    .recipient = fields[8]
    .numrecipients = fields[9]
    .agent = fields[10]
    .event = fields[11]
    .action = fields[12]
    .smtpresponse = fields[13]
    .reason = fields[14]
    .reasondata = fields[15]
    .diagnostics = fields[16]
    .networkmsgid = fields[17]
    .tenantid = fields[18]
    .directionality = fields[19]

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "exchange_agentlog"
    .sourcetype = "exchange_artefacts"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.Exchange_AgentLog_logs_coerce_to_sink]
  type = "remap"
  inputs = ["Exchange_AgentLog_logs_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9])|Z)?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? to_timestamp(value_string) ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

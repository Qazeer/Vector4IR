# Description: Process Azure O365 Mailbox Audit logs, as retrieved by DFIR-ORC365RC.
#              Filename should match: "**/*MailboxAuditLog*.json"
#              source = "o365_mailboxaudit" & sourcetype = "azure_artefact"
# Author(s): Axel ROC, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-01
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_TENANT = "<SOURCE_TENANT>"

data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Azure_O365_MailboxAuditLog_DFIR-O365RC_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The source folder containing the DFIR-O365RC JSON outputs is required}/**/*MailboxAuditLog*.json"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.Azure_O365_MailboxAuditLog_DFIR-O365RC_parser]
  inputs = ["Azure_O365_MailboxAuditLog_DFIR-O365RC_input"]
  type = "remap"
  source = '''
    splitted, err = split(.message, "\n")
    if err != null {
      log("Unable to split message on newlines: " + err, level: "error")
    }

    . = flatten(map_values(splitted) -> |value| {
      parsed_value, err = parse_json(value)
      if err != null {
        log("Unable to parse JSON: " + err, level: "error")
        null
      } else {
        parsed_value
      }
    })
  '''

[transforms.Azure_O365_MailboxAuditLog_DFIR-O365RC_enrich_to_sink]
  inputs = ["Azure_O365_MailboxAuditLog_DFIR-O365RC_parser"]
  type = "remap"
  source = '''
    timestamp_captured = parse_regex!(.LastAccessed, r'/Date\((?P<unix_timestamp>\d+)000\)/')
    .LastAccessedParsed, err = parse_timestamp(timestamp_captured.unix_timestamp, format: "%s")
    if err != null {
      log("Failed to parse unix timestamp: " + err, level: "error")
    }

    # Parse OperationProperties fields.
    # Expected formats:
    #   "{RuleOperation:RemoveMailboxRule, RuleId:5984694343254933505, RuleState:, RuleCondition:{}, RuleName:, RuleProvider:, RuleActions:[]}"
    #   "RuleOperation:RemoveMailboxRule, RuleId:5984694343254933505, RuleState:, RuleCondition:{}, RuleName:, RuleProvider:, RuleActions:[]"
    if is_null(.OperationProperties) == false {
      OperationProperties = .OperationProperties
      match_operation_properties, err = parse_regex(.OperationProperties, r'^\{(?P<properties>.*)\}$')
      if (err == null) {
        OperationProperties = match_operation_properties.properties
      }
      . |= parse_key_value(OperationProperties, key_value_delimiter: ":", field_delimiter: ",") ?? {}
    }

    .timestamp = .LastAccessedParsed

    # Fields added to have the same nomenclature between the different log sources (audit, signins, unified logs...)
    .AccountName = .MailboxOwnerUPN
    .Username = .LogonUserDisplayName

    .host = "${SOURCE_TENANT:?The source AzureAD tenant is required}"
    .source = "o365_mailboxaudit"
    .sourcetype = "azure_artefact"
  '''

# Vector_Windows_EZTools_RECmd_LocalAccounts config.
# Description: Process Windows artefacts parsed with RECmd (CSV output).
#              Filename should match: "*_UserAccounts_*.csv"
#              Hive type: SAM
#              Registry key path: SAM\Domains\Account\Users
#              RECmd command: RECmd\RECmd.exe -d %sourceDirectory% --bn RECmd\RECmd_Batch_MC.reb --nl --csv %destinationDirectory% -q
#              Example command: RECmd\RECmd.exe -d "C:\" --bn RECmd\RECmd_Batch_MC.reb --nl --csv <YOUR_OUTPUT> -q
#              source = "windows_registry_localaccounts" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.RECmd_LocalAccounts_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the RECmd Registry Local Accounts files is required.}/**/*_UserAccounts_*.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.RECmd_LocalAccounts_csv_parser]
  type = "remap"
  inputs = ["RECmd_LocalAccounts_csv_input"]
  source = '''
    # Expect CSV header:
    # BatchKeyPath,BatchValueName,UserId,InvalidLoginCount,TotalLoginCount,CreatedOn,LastLoginTime,LastPasswordChange,LastIncorrectPassword,ExpiresOn,UserName,FullName,PasswordHint,Groups,Comment,UserComment,HomeDirectory,AccountDisabled,HomeDirectoryRequired,PasswordNotRequired,TempDuplicateAccount,NormalUserAccount,MnsLogonAccount,InterdomainTrustAccount,WorkstationTrustAccount,ServerTrustAccount,PasswordDoesNotExpire,AutoLocked
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log\("Unable to split CSV: " + err, level: "error")
    }

    if fields[0] == "BatchKeyPath" {
      expected_header = "BatchKeyPath,BatchValueName,UserId,InvalidLoginCount,TotalLoginCount,CreatedOn,LastLoginTime,LastPasswordChange,LastIncorrectPassword,ExpiresOn,UserName,FullName,PasswordHint,Groups,Comment,UserComment,HomeDirectory,AccountDisabled,HomeDirectoryRequired,PasswordNotRequired,TempDuplicateAccount,NormalUserAccount,MnsLogonAccount,InterdomainTrustAccount,WorkstationTrustAccount,ServerTrustAccount,PasswordDoesNotExpire,AutoLocked"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .batchkeypath = fields[0]
    .batchvaluename = fields[1]
    .userid = fields[2]
    .invalidlogincount = fields[3]
    .totallogincount = fields[4]
    .createdon = fields[5]
    .lastlogintime = fields[6]
    .lastpasswordchange = fields[7]
    .lastincorrectpassword = fields[8]
    .expireson = fields[9]
    .username = fields[10]
    .fullname = fields[11]
    .passwordhint = fields[12]
    .groups = fields[13]
    .comment = fields[14]
    .usercomment = fields[15]
    .homedirectory = fields[16]
    .accountdisabled = fields[17]
    .homedirectoryrequired = fields[18]
    .passwordnotrequired = fields[19]
    .tempduplicateaccount = fields[20]
    .normaluseraccount = fields[21]
    .mnslogonaccount = fields[22]
    .interdomaintrustaccount = fields[23]
    .workstationtrustaccount = fields[24]
    .servertrustaccount = fields[25]
    .passworddoesnotexpire = fields[26]
    .autolocked = fields[27]

    .timestamp = .createdon

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_registry_localaccounts"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.RECmd_LocalAccounts_coerce]
  type = "remap"
  inputs = ["RECmd_LocalAccounts_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f %z") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

[transforms.RECmd_LocalAccounts_dedup_CreatedOn_to_sink]
  type = "remap"
  inputs = ["RECmd_LocalAccounts_coerce"]
  source = '''
    if !exists(.createdon){
      abort
    }

    .timestamp = .createdon
    .operation = "creation"
    .suboperation = "creation_localaccount_createdon"
  '''

[transforms.RECmd_LocalAccounts_dedup_LastLoginTime_to_sink]
  type = "remap"
  inputs = ["RECmd_LocalAccounts_coerce"]
  source = '''
    if !exists(.lastlogintime){
      abort
    }

    .timestamp = .lastlogintime
    .operation = "connection"
    .suboperation = "connection_lastlogintime"
  '''

[transforms.RECmd_LocalAccounts_dedup_LastPasswordChange_to_sink]
  type = "remap"
  inputs = ["RECmd_LocalAccounts_coerce"]
  source = '''
    if !exists(.lastpasswordchange){
      abort
    }

    .timestamp = .lastpasswordchange

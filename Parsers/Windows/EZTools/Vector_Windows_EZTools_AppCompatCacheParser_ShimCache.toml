# Vector_Windows_EZTools_AppCompatCacheParser_ShimCache config.
# Description: Process Windows artefacts parsed with AppCompatCacheParser (CSV output).
#              Filename should match: "*AppCompatCache.csv"
#              AppCompatCacheParser command: AppCompatCacheParser.exe -f %sourceFile% --csv %destinationDirectory%
#              Example command: AppCompatCacheParser.exe -f "C:\Windows\System32\config\SYSTEM" --csv <YOUR_OUTPUT>
#              source = "windows_shimcache" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.AppCompatCacheParser_ShimCache_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the AppCompatCacheParser ShimCache files is required.}/**/*AppCompatCache.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.AppCompatCacheParser_ShimCache_csv_parser]
  type = "remap"
  inputs = ["AppCompatCacheParser_ShimCache_csv_input"]
  source = '''
    # Expect CSV header:
    # ControlSet,CacheEntryPosition,Path,LastModifiedTimeUTC,Executed,Duplicate,SourceFile
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[ShimCache] Unable to split CSV: " + err, level: "error")
    }

    if fields[0] == "ControlSet" {
      expected_header = "ControlSet,CacheEntryPosition,Path,LastModifiedTimeUTC,Executed,Duplicate,SourceFile"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .controlset = fields[0]
    .cacheentryposition = fields[1]
    .path = fields[2]
    .lastmodifiedtimeutc = fields[3]
    .executed = fields[4]
    .duplicate = fields[5]
    .sourcefile = fields[6]

    .timestamp = .lastmodifiedtimeutc

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_shimcache"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.AppCompatCacheParser_ShimCache_coerce_to_sink]
  type = "remap"
  inputs = ["AppCompatCacheParser_ShimCache_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      if (convert_err == null && match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f %z") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      # Only convert string to float (to avoid converting timestamp to float).
      } else if (tmp_value, err = to_float(value); convert_err == null && err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

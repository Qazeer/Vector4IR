# Vector_Windows_EZTools_WxTCmd_Activitydb config.
# Description: Process Windows artefacts parsed with WxTCmd (CSV output).
#              Filename should match: "*_Activity.csv"
#              WxTCmd command: WxTCmd.exe -f %sourceFile% --csv %destinationDirectory%
#              Example command: WxTCmd.exe -f "C:\Users\<USER>\AppData\Local\ConnectedDevicesPlatform\<FOLDER>\ActivitiesCache.db" --csv <YOUR_OUTPUT>
#              source = "windows_activitydb" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.WxTCmd_Activitydb_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the WxTCmd Activitydb files is required.}/**/*_Activity.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.WxTCmd_Activitydb_csv_parser]
  type = "remap"
  inputs = ["WxTCmd_Activitydb_csv_input"]
  source = '''
    # Expect CSV header:
    # Id,Executable,DisplayText,ContentInfo,StartTime,EndTime,LastModifiedTime,ExpirationTime,CreatedInCloud,LastModifiedOnClient,OriginalLastModifiedOnClient,ActivityType,IsLocalOnly,ETag,PackageIdHash,PlatformDeviceId,Duration
    # Remove CSV parsing error on DisplayText value which is under following format: "Téléchargez le navigateur Firefox, rapide, sécurisé...".
    .message, err = replace(.message, s'"', s'\"')
    if err != null {
      log("Unable to remove whitespaces: " + err, level: "error")
    }

    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    if fields[1] == "Executable" {
      expected_header = "Id,Executable,DisplayText,ContentInfo,StartTime,EndTime,LastModifiedTime,ExpirationTime,CreatedInCloud,LastModifiedOnClient,OriginalLastModifiedOnClient,ActivityType,IsLocalOnly,ETag,PackageIdHash,PlatformDeviceId,Duration"
      current_header = strip_whitespace(string(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + .message, level: "error")
      }
      abort
    }

    .id = fields[0]
    .executable = fields[1]
    .displaytext = fields[2]
    .contentinfo = fields[3]
    .starttime = fields[4]
    .endtime = fields[5]
    .lastmodifiedtime = fields[6]
    .expirationtime = fields[7]
    .createdincloud = fields[8]
    .lastmodifiedonclient = fields[9]
    .originallastmodifiedonclient = fields[10]
    .activitytype = fields[11]
    .islocalonly = fields[12]
    .etag = fields[13]
    .packageidhash = fields[14]
    .platformdeviceid = fields[15]
    .duration = fields[16]

    .timestamp = .starttime

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_activitydb"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.WxTCmd_Activitydb_coerce]
  type = "remap"
  inputs = ["WxTCmd_Activitydb_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%.f %z") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

[transforms.WxTCmd_Activitydb_dedup_StartTime_to_sink]
  type = "remap"
  inputs = ["WxTCmd_Activitydb_coerce"]
  source = '''
    if is_nullish(.starttime) {
      abort
    }

    .timestamp = .starttime
    .operation = "execution"
    .suboperation = "execution_starttime"
  '''


# Vector_SQLServer_QueryStore_custom.toml config.
# Description: Process SQL server Query Store catalog views, exported in CSV output.
#              The CSV header is based on a custom join SQL statement, and should be adapted based on the exported data.
#              Filename should match: "SQLServer_QueryStore*.csv"
#              source = "sqlserver_querystore" & sourcetype = "database_sqlserver"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-12-30
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.SQLServer_QueryStore_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the SQL Server csv input files is required.}/**/*SQLServer_QueryStore*.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.SQLServer_QueryStore_csv_parser]
  type = "remap"
  inputs = ["SQLServer_QueryStore_csv_input"]
  source = '''
    # Expect CSV header:
    # "DatabaseName","query_id","query_sql_text","plan_id","engine_version","compatibility_level","initial_compile_start_time","start_time","end_time","execution_type_desc","count_executions","avg_duration","avg_cpu_time","avg_logical_io_reads","avg_logical_io_writes","avg_physical_io_reads","avg_dop","avg_query_max_used_memory","avg_rowcount","avg_num_physical_io_reads","avg_log_bytes_used","avg_tempdb_space_used"
    if .__offset == 0 {
      expected_header = "\"DatabaseName\",\"query_id\",\"query_sql_text\",\"plan_id\",\"engine_version\",\"compatibility_level\",\"initial_compile_start_time\",\"start_time\",\"end_time\",\"execution_type_desc\",\"count_executions\",\"avg_duration\",\"avg_cpu_time\",\"avg_logical_io_reads\",\"avg_logical_io_writes\",\"avg_physical_io_reads\",\"avg_dop\",\"avg_query_max_used_memory\",\"avg_rowcount\",\"avg_num_physical_io_reads\",\"avg_log_bytes_used\",\"avg_tempdb_space_used\""
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    .database_name = fields[0]
    .query_id = fields[1]
    .query_sql_text = fields[2]
    .plan_id = fields[3]
    .engine_version = fields[4]
    .compatibility_level = fields[5]
    .initial_compile_start_time = fields[6]
    .start_time = fields[7]
    .end_time = fields[8]
    .execution_type_desc = fields[9]
    .count_executions = fields[10]
    .avg_duration = fields[11]
    .avg_cpu_time = fields[12]
    .avg_logical_io_reads = fields[13]
    .avg_logical_io_writes = fields[14]
    .avg_physical_io_reads = fields[15]
    .avg_dop = fields[16]
    .avg_query_max_used_memory = fields[17]
    .avg_rowcount = fields[18]
    .avg_num_physical_io_reads = fields[19]
    .avg_log_bytes_used = fields[19]
    .avg_tempdb_space_used = fields[19]

    .timestamp = .start_time

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "sqlserver_querystore"
    .sourcetype = "database_sqlserver"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.SQLServer_QueryStore_coerce]
  type = "remap"
  inputs = ["SQLServer_QueryStore_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

[transforms.SQLServer_QueryStore_dedup_start_time_to_sink]
  type = "remap"
  inputs = ["SQLServer_QueryStore_coerce"]
  source = '''
    if is_nullish(.start_time) {
      abort
    }

    .timestamp = .start_time
    .operation = "start_time"
  '''

[transforms.SQLServer_QueryStore_dedup_end_time_to_sink]
  type = "remap"
  inputs = ["SQLServer_QueryStore_coerce"]
  source = '''
    if is_nullish(.end_time) {
      abort
    }

    .timestamp = .end_time
    .operation = "end_time"
  '''

[transforms.SQLServer_QueryStore_dedup_initial_compile_start_time_to_sink]
  type = "remap"
  inputs = ["SQLServer_QueryStore_coerce"]
  source = '''
    if is_nullish(.initial_compile_start_time) {
      abort
    }

    .timestamp = .initial_compile_start_time
    .operation = "initial_compile_start_time"
  '''

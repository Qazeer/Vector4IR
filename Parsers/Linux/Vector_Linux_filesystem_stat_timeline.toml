# Description: Process Linux filesystem stat timeline.
#              Filename should match: "*stat_timeline*.log"
#              Timeline can be generated with: find <DIRECTORY> -xdev -print0 | xargs -0 stat -c 'crtime="%w" crtime_epoch="%W" mtime="%y" mtime_epoch="%Y" ctime="%z" ctime_epoch="%Z" atime="%x" atime="%X" size_bytes="%s" userID="%u" username="%U" groupID="%g" groupname="%G" access="%a" access_pretty="%A" filetype="%F" filename="%n" filename_deref="%N"'
#              source = "linux_stat_timeline" & sourcetype = "linux_artefact"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-01
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Linux_stat_timeline_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the Linux state timeline files is required. Add '**' to process the specified folder recursively (exemple: \"C:\\logs\" or folder \"C:\\logs\\**\")}/*stat_timeline*.log"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.Linux_stat_timeline_parser]
  type = "remap"
  inputs = ["Linux_stat_timeline_input"]
  source = '''
    # Parse the key-value pairs.
    ., err = parse_key_value(.message, key_value_delimiter: "=", field_delimiter: " ")
    if (err != null) {
      log("Unable to convert to parse log line: " + err, level: "error")
    }

    # Coerce types.
    . = map_values(.) -> |value| {
      if (tmp_value, err = parse_timestamp(value, format: "%Y-%m-%d %H:%M:%S.%f %z"); err == null) {
        tmp_value
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else {
        value
      }
    }

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "linux_stat_timeline"
    .sourcetype = "linux_artefact"
  '''

[transforms.Linux_stat_timeline_dedup_crtime_to_sink]
  type = "remap"
  inputs = ["Linux_stat_timeline_parser"]
  source = '''
    if !(exists(.crtime) && is_timestamp(.crtime)) {
      abort
    }
    .timestamp = .crtime
    .operation = "creation"
    .suboperation = "file_creation"
  '''

[transforms.Linux_stat_timeline_dedup_mtime_to_sink]
  type = "remap"
  inputs = ["Linux_stat_timeline_parser"]
  source = '''
    if !(exists(.mtime) && is_timestamp(.mtime)) {
      abort
    }
    .timestamp = .mtime
    .operation = "modification"
    .suboperation = "file_modification"
  '''

[transforms.Linux_stat_timeline_dedup_ctime_to_sink]
  type = "remap"
  inputs = ["Linux_stat_timeline_parser"]
  source = '''
    if !(exists(.ctime) && is_timestamp(.ctime)) {
      abort
    }
    .timestamp = .ctime
    .operation = "modification"
    .suboperation = "file_change"
  '''

[transforms.Linux_stat_timeline_dedup_atime_to_sink]
  type = "remap"
  inputs = ["Linux_stat_timeline_parser"]
  source = '''
    if !(exists(.atime) && is_timestamp(.atime)) {
      abort
    }
    .timestamp = .atime
    .operation = "access"
    .suboperation = "file_access"
  '''

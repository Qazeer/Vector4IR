# Description: Process Dissect (walkfs) multi-lines json fileystem timeline.
#              Example command: target-query --json <TARGET> -f walkfs /
#              Filename should match: "*dissect_walkfs*"
#              source = "dissect_walkfs" & sourcetype = "dissect_timeline"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2023-01-14
# Required environment variables:
#   INPUT_FILE = "<INPUT_FILE>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.Dissect_walkfs_json_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing Dissect walkfs timeline(s) is required.}/**/*dissect_walkfs*"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.Dissect_walkfs_json_parser]
  type = "remap"
  inputs = ["Dissect_walkfs_json_input"]
  source = '''
    splitted, err = split(.message, "\n")
    if err != null {
      log("Unable to split message on newlines: " + err, level: "error")
    }

    . = map_values(splitted) -> |value| {
      parsed_value, err = parse_json(value)
      if err != null {
        value_str = string(value)
        log("Unable to parse JSON '" + value_str + "', error: " + err, level: "error")
        null
      } else {
        parsed_value
      }
    }
  '''

[transforms.Dissect_walkfs_json_enrich]
  type = "remap"
  inputs = ["Dissect_walkfs_json_parser"]
  source = '''
    # Flatten JSON event.
    . = flatten(.)

    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "dissect_walkfs"
    .sourcetype = "dissect_timeline"
  '''

[transforms.Dissect_walkfs_json_coerce]
  type = "remap"
  inputs = ["Dissect_walkfs_json_enrich"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

[transforms.Dissect_walkfs_json_atime_to_sink]
  type = "remap"
  inputs = ["Dissect_walkfs_json_coerce"]
  source = '''
    if is_nullish(.atime) {
      abort
    }

    .timestamp = .atime
    .operation = "access"
    .suboperation = "file_access_fs"
  '''

[transforms.Dissect_walkfs_json_ctime_to_sink]
  type = "remap"
  inputs = ["Dissect_walkfs_json_coerce"]
  source = '''
    if is_nullish(.ctime) {
      abort
    }

    .timestamp = .ctime
    .operation = "change"
    .suboperation = "file_change_fs"
  '''

[transforms.Dissect_walkfs_json_mtime_to_sink]
  type = "remap"
  inputs = ["Dissect_walkfs_json_coerce"]
  source = '''
    if is_nullish(.mtime) {
      abort
    }

    .timestamp = .mtime
    .operation = "modification"
    .suboperation = "file_modification_fs"
  '''

[transforms.Dissect_walkfs_json_btime_to_sink]
  type = "remap"
  inputs = ["Dissect_walkfs_json_coerce"]
  source = '''
    if is_nullish(.btime) {
      abort
    }

    .timestamp = .btime
    .operation = "creation"
    .suboperation = "file_creation_fs"
  '''

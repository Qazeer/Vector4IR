#   mode="bulk"
#   # bulk.action = "create"
#   bulk.index = "${INDEX:?An index name must be specified for ELK / Splunk index}"
#   endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
#   auth.strategy = "basic"
#   auth.user = "${ELK_USERNAME:?ELK_USERNAME is required}"
#   auth.password = "${ELK_PASSWORD:?ELK_PASSWORD is required}"
#   suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x

# Sink transform to send processed logs to a Splunk instance.
[sinks.Windows_EVTX_winlogbeat_Splunk_sink]
  type = "splunk_hec_logs"
  inputs = [ "Windows_EVTX_winlogbeat_parser" ]
  endpoint = "https://${SPLUNK_IP:?Splunk IP is required}:${SPLUNK_PORT:-8088}"
  default_token = "${SPLUNK_HEC_TOKEN:?Splunk HEC token is required}"
  compression = "none"
  index = "${INDEX:?An index name must be specified for the ELK / Splunk index}"
  host_key = "host"
  source = "{{ source }}"
  sourcetype = "{{ sourcetype }}"
  tls.verify_certificate = false
  encoding.codec = "json"

# Description: Winlogbeat configuration to parse EVTX files to JSON.
# Usage: winlogbeat.exe -e -c "Winlogbeat_EVTX_to_JSON_all.yml" -E EVTX_FOLDER="<INPUT_EVTX_FOLDER>" -E OUTPUT_FOLDER="<OUTPUT_JSON_FOLDER>" -E OUTPUT_FILENAME="<OUTPUT_JSON_FILENAME>"
# Authors: Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-01
# Required environment variables:
#   EVTX_FOLDER = "<INPUT_EVTX_FOLDER>"
#   OUTPUT_FOLDER = "<OUTPUT_JSON_FOLDER>"
#   OUTPUT_FILENAME = "<OUTPUT_JSON_FILENAME>"

# Powershell code snippet to craft the below list:
# Get-ChildItem -Path "<EVTX_FOLDER>\*.evtx" | ForEach-Object {
#    $msg =
#@"
#  - name: "`${EVTX_FOLDER}\\$($_.Name)"
#    no_more_events: stop
#"@
#    Write-Host $msg
#}


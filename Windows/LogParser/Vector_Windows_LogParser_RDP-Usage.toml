# Vector_Windows_EZTools_LogParser_RDP-Usage config.
# Description: Process Windows RDP usage events parsed with LogParser (CSV output).
#              Filename should match: "*RDP-Usage.csv"
#              source = "windows_evtx_rdp-usage" & sourcetype = "windows_artefact"
#              LogParser command: XXX
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.LogParser_RDP-Usage_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the LogParser RDP usage events files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*RDP-Usage.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.LogParser_RDP-Usage_csv_parser]
  type = "remap"
  inputs = ["LogParser_RDP-Usage_csv_input"]
  source = '''
    # Expect CSV header:
    # Date,SourceName,EventID,User,Description,SessionID,SourceSessionID,ReasonCode,SourceIP
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[EVTX RDP-Usage] Unable to split CSV: " + err, level: "error")
    }

    if fields[1] == "SourceName" {
      expected_header = "Date,SourceName,EventID,User,Description,SessionID,SourceSessionID,ReasonCode,SourceIP"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .date = fields[0]
    .sourcename = fields[1]
    .eventid = fields[2]
    .user = fields[3]
    .description = fields[4]
    .sessionid = .fields[5]
    .source_sessionid = .fields[6]
    .reasoncode = .fields[7]
    .sourceip = fields[8]

    .timestamp = .date

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_evtx_rdp-usage"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.LogParser_RDP-Usage_coerce_to_sink]
  type = "remap"
  inputs = ["LogParser_RDP-Usage_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      if (tmp_value, err = parse_timestamp(value, format: "%Y-%m-%d %H:%M:%S"); err == null) {
        tmp_value
      } else if (tmp_value, err = parse_timestamp(value, format: "%Y-%m-%d %H:%M:%S.%f"); err == null) {
        tmp_value
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

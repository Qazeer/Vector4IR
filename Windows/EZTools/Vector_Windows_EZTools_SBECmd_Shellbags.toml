# Vector_Windows_EZTools_SBECmd_Shellbags config.
# Description: Process Windows artefacts parsed with SBECmd (CSV output).
#              Filename should match: "*NTUSER.DAT.csv" and/or "*ntuser.dat.csv" and/or "*UsrClass.dat.csv"
#              SBECmd command: SBECmd.exe -d %sourceDirectory% --csv %destinationDirectory% -q
#              Example command: SBECmd.exe -d "C:\ --csv <YOUR_OUTPUT> -q
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_shellbags & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_shellbags & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.SBECmd_Shellbags_csv_input]
  type = "file"
  include = [
    "${INPUT_FOLDER:?The input folder containing the SBECmd Shellbags NTUSER (uppercase) files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*NTUSER.DAT.csv",
    "${INPUT_FOLDER:?The input folder containing the SBECmd Shellbags ntuser (lowercase) files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*ntuser.dat.csv",
    "${INPUT_FOLDER:?The input folder containing the SBECmd Shellbags UsrClass files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*UsrClass.dat.csv"
  ]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.SBECmd_Shellbags_csv_parser]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_input"]
  source = '''
  # Expect CSV header:
  # BagPath,Slot,NodeSlot,MRUPosition,AbsolutePath,ShellType,Value,ChildBags,CreatedOn,ModifiedOn,AccessedOn,LastWriteTime,MFTEntry,MFTSequenceNumber,ExtensionBlockCount,FirstInteracted,LastInteracted,HasExplored,Miscellaneous
  fields, err = parse_csv(.message, delimiter: ",")
  if err != null {
    log("[ShellBags] Unable to split CSV: " + err, level: "error")
  }

  if fields[11] == "LastWriteTime"{
    abort
  }

  .bagpath = fields[0]
  .mruposition = fields[3]
  .absolutepath = fields[4]
  .shelltype = fields[5]
  .value = fields[6]
  .childbags, err = to_int(fields[7])

  if (fields[8] != null && fields[8] != "" && fields[8] != "\r") {
      .iscreatedonnull = "false"
      .createdon, err = to_timestamp(fields[8])
  } else {
      .iscreatedonnull = "true"
  }

  if (fields[9] != null && fields[9] != "" && fields[9] != "\r") {
      .ismodifiedonnull = "false"
      .modifiedon, err = to_timestamp(fields[9])
  } else {
      .ismodifiedonnull = "true"
  }

  if (fields[10] != null && fields[10] != "" && fields[10] != "\r") {
      .isaccessedonnull = "false"
      .accessedon, err = to_timestamp(fields[10])
  } else {
      .isaccessedonnull = "true"
  }

  if (fields[11] != null && fields[11] != "" && fields[11] != "\r") {
      .islastwritetimenull = "false"
      .lastwritetime, err = to_timestamp(fields[11])
  } else {
      .islastwritetimenull = "true"
  }

  .mftentry = fields[12]

  if (fields[15] != null && fields[15] != "" && fields[15] != "\r") {
      .isfirstinteractednull = "false"
      .firstinteracted, err = to_timestamp(fields[15])
  } else {
      .isfirstinteractednull = "true"
  }

  if (fields[16] != null && fields[16] != "" && fields[16] != "\r") {
      .islastinteractednull = "false"
      .lastinteracted, err = to_timestamp(fields[16])
  } else {
      .islastinteractednull = "true"
  }

  if (.file != null && .file != "") {
    if (contains!(.file, "_Users_")) {
      if (contains!(.file, "_AppData_Local_Microsoft_Windows_UsrClass")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_AppData_Local_Microsoft_Windows_UsrClass.dat.csv')."user"
      } else if (contains!(.file, "_NTUSER.DAT")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_NTUSER.DAT.csv')."user"
      } else if (contains!(.file, "_ntuser.dat")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_ntuser.dat.csv')."user"
      }
    } else if (contains!(.file, "_Utilisateurs_")) {
      if (contains!(.file, "_AppData_Local_Microsoft_Windows_UsrClass")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_AppData_Local_Microsoft_Windows_UsrClass.dat.csv')."user"
      } else if (contains!(.file, "_NTUSER.DAT")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_NTUSER.DAT.csv')."user"
      } else if (contains!(.file, "_ntuser.dat")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_ntuser.dat.csv')."user"
      }
    }
  } else {
      .user = ""
  }

  # Add the metadata fields following the parsing.
  .sourcehost = "${SOURCE_HOST:?The source host is required}"
  .host = .sourcehost
  .source = "windows_shellbags"
  .sourcetype = "windows_artefact"

  # Delete irrelevant default fields.
  del(.source_type)
  del(.file)
  del(.message)
  '''

[transforms.SBECmd_Shellbags_dedup_LastWriteTime]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.lastwritetime){
    abort
  }

  .timestamp = .lastwritetime
  .operation = "modification"
  .suboperation = "modification_lastwritetime"
    '''

[transforms.SBECmd_Shellbags_dedup_CreatedOn]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.createdon){
    abort
  }

  .timestamp = .createdon
  .operation = "creation"
  .suboperation = "creation_createdon"
    '''

[transforms.SBECmd_Shellbags_dedup_ModifiedOn]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.modifiedon){
    abort
  }

  .timestamp = .modifiedon
  .operation = "modification"
  .suboperation = "modification_modifiedon"
    '''

[transforms.SBECmd_Shellbags_dedup_AccessedOn]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.accessedon){
    abort
  }

  .timestamp = .accessedon
  .operation = "access"
  .suboperation = "access_accessedon"
    '''

[transforms.SBECmd_Shellbags_dedup_FirstInteracted]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.firstinteracted){
    abort
  }

  .timestamp = .firstinteracted
  .operation = "modification"
  .suboperation = "modification_firstinteracted"
    '''

[transforms.SBECmd_Shellbags_dedup_LastInteracted]
  type = "remap"
  inputs = ["SBECmd_Shellbags_csv_parser"]
  source = '''
  if !exists(.lastinteracted){
    abort
  }

  .timestamp = .lastinteracted
  .operation = "modification"
  .suboperation = "modification_lastinteracted"
    '''


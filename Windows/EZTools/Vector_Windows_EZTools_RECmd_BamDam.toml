# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Vector_Windows_EZTools_RECmd_BamDam config.
# Description: Process Windows artefacts parsed with RECmd (CSV output).
#              Provides full path of the executable file that was run on the system and last execution date/time.
#              Filename should match: "*_BamDam_*.csv"
#              Hive type: SYSTEM
#              Registry key path: "ControlSet00*\Services\bam\State\UserSettings\*" and "ControlSet00*\Services\bam\UserSettings\*" and "ControlSet00*\Services\dam\State\UserSettings\*" and "ControlSet00*\Services\dam\UserSettings\*"
#              RECmd command: RECmd\RECmd.exe -d %sourceDirectory% --bn RECmd\RECmd_Batch_MC.reb --nl --csv %destinationDirectory% -q
#              Example command: RECmd\RECmd.exe -d "C:\" --bn RECmd\RECmd_Batch_MC.reb --nl --csv <YOUR_OUTPUT> -q

# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_registry_bamdam & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_registry_bamdam & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

  [sources.RECmd_BamDam_csv_input]
    type = "file"
    include = ["${INPUT_FOLDER:?The input folder containing the RECmd Registry BamDam files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/*/Registry/*_BamDam_*.csv"]
    data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
    oldest_first = true
    fingerprint.strategy = "device_and_inode"
    max_line_bytes = 100_000_000

  [transforms.RECmd_BamDam_csv_parser]
    type = "remap"
    inputs = ["RECmd_BamDam_csv_input"]
    source = '''
    # Expect CSV header:
    # BatchKeyPath,BatchValueName,Program,ExecutionTime
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[Registry_BamDam] Unable to split CSV: " + err, level: "error")
    }

    if fields[2] == "Program"{
      abort
    }

    .program = fields[2]

    if (fields[3] != null && fields[3] != "" && fields[3] != "\r") {
        # Parse ExecutionTime field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
        .executiontime, err = parse_timestamp(fields[3], format: "%Y-%m-%d %H:%M:%S.%f")
        if err != null {
          log("[Registry_BamDam] Unable to parse ExecutionTime timestamp: " + err, level: "error")
        }
    }

    .timestamp = .executiontime
    # Parse BatchKeyPath field to extract user SID. Expected format: S-1-5-1234567890-123456789-1234567890-512.
    .user_sid, err = parse_regex(fields[0], r'UserSettings\\(?P<sid>.*)')."sid"

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_registry_bamdam"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    '''

  # Sink to send processed logs to void, for validating that the pipeline doest not raise errors.
  # [sinks.RECmd_BamDam_blackhole_sink]
  #   type = "blackhole"
  #   inputs = ["RECmd_BamDam_csv_parser"]

  # Sink to send processed logs to the console, for debugging.
  # [sinks.RECmd_BamDam_console_sink]
  #   type = "console"
  #   inputs = ["RECmd_BamDam_csv_parser"]
  #   target = "stdout"
  #   encoding.codec = "json"

  # Sink transform to send processed logs to an ELK instance.
  [sinks.RECmd_BamDam_ELK_sink]
    type = "elasticsearch"
    inputs = ["RECmd_BamDam_csv_parser"]
    bulk.index = "${INDEX}-{{ sourcehost }}-registry_bamdam"
    endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
    auth.strategy = "basic"
    auth.user = "${ELK_LOGIN}"
    auth.password = "${ELK_PASSWORD}"
    suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x

  # Sink transform to send processed logs to a Splunk instance.
  # [sinks.RECmd_BamDam_Splunk_sink]
  #   type = "splunk_hec_logs"
  #   inputs = ["RECmd_BamDam_csv_parser"]
  #   endpoint = "http://${SPLUNK_IP:?Splunk IP is required}:${SPLUNK_PORT:-8088}"
  #   default_token = "${SPLUNK_HEC_TOKEN:?Splunk HEC token is required}"
  #   compression = "none"
  #   index = "${INDEX:?An index name must be specified for the ELK / Splunk index}"
  #   host_key = "host"
  #   source = "{{ source }}"
  #   sourcetype = "{{ sourcetype }}"
  #   tls.verify_certificate = false
  #   encoding.codec = "json"

# Registry BAM/DAM of local user accounts - end.

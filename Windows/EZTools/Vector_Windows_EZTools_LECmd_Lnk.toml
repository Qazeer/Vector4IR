  #   inputs = [
  #     "LECmd_Lnk_dedup_SourceModified",
  #     "LECmd_Lnk_dedup_SourceCreated",
  #     "LECmd_Lnk_dedup_SourceAccessed",
  #     "LECmd_Lnk_dedup_TargetCreated",
  #     "LECmd_Lnk_dedup_TargetModified",
  #     "LECmd_Lnk_dedup_TargetAccessed",
  #     "LECmd_Lnk_dedup_TrackerCreatedOn"
  #   ]
  #   endpoint = "http://${SPLUNK_IP:?Splunk IP is required}:${SPLUNK_PORT:-8088}"
  #   default_token = "${SPLUNK_HEC_TOKEN:?Splunk HEC token is required}"
  #   compression = "none"
  #   index = "${INDEX:?An index name must be specified for the ELK / Splunk index}"
  #   host_key = "host"
  #   source = "{{ source }}"
  #   sourcetype = "{{ sourcetype }}"
  #   tls.verify_certificate = false
  #   encoding.codec = "json"

# LNK files - end.

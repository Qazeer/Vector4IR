  # [sinks.LECmd_Lnk_console_sink]
  #   type = "console"
  #   inputs = [
  #     "LECmd_Lnk_dedup_SourceModified",
  #     "LECmd_Lnk_dedup_SourceCreated",
  #     "LECmd_Lnk_dedup_SourceAccessed",
  #     "LECmd_Lnk_dedup_TargetCreated",
  #     "LECmd_Lnk_dedup_TargetModified",
  #     "LECmd_Lnk_dedup_TargetAccessed",
  #     "LECmd_Lnk_dedup_TrackerCreatedOn"
  #   ]
  #   target = "stdout"
  #   encoding.codec = "json"

  # Sink transform to send processed logs to an ELK instance.
  [sinks.LECmd_Lnk_ELK_sink]
    type = "elasticsearch"
    inputs = [
      "LECmd_Lnk_dedup_SourceModified",
      "LECmd_Lnk_dedup_SourceCreated",
      "LECmd_Lnk_dedup_SourceAccessed",
      "LECmd_Lnk_dedup_TargetCreated",
      "LECmd_Lnk_dedup_TargetModified",
      "LECmd_Lnk_dedup_TargetAccessed",
      "LECmd_Lnk_dedup_TrackerCreatedOn"
    ]
    bulk.index = "${INDEX}-{{ sourcehost }}-lnkfiles"
    endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
    auth.strategy = "basic"
    auth.user = "${ELK_LOGIN}"
    auth.password = "${ELK_PASSWORD}"
    suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x

  # Sink transform to send processed logs to a Splunk instance.
  # [sinks.LECmd_Lnk_Splunk_sink]

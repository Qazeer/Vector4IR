  #   target = "stdout"
  #   encoding.codec = "json"

  # Sink transform to send processed logs to an ELK instance.
  [sinks.AmcacheParser_AmCache-Program-Entries_ELK_sink]
    type = "elasticsearch"
    inputs = [
      "AmcacheParser_AmCache-Program-Entries_dedup_KeyLastWriteTimestamp",
      "AmcacheParser_AmCache-Program-Entries_dedup_InstallDate",
      "AmcacheParser_AmCache-Program-Entries_dedup_InstallDateArpLastModified",
      "AmcacheParser_AmCache-Program-Entries_dedup_InstallDateMsi",
      "AmcacheParser_AmCache-Program-Entries_dedup_InstallDateFromLinkFile"
    ]
    bulk.index = "${INDEX}-{{ sourcehost }}-amcache-programentries"
    endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
    auth.strategy = "basic"
    auth.user = "${ELK_LOGIN}"
    auth.password = "${ELK_PASSWORD}"
    suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x


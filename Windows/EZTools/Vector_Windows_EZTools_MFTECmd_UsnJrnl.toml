# Vector_Windows_EZTools_MFTECmd_UsnJrnl config.
# Description: Process Windows artefacts parsed with MFTECmd (CSV output).
#              Filename should match: "*J_Output.csv"
#              source = "windows_usnjrnl" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.MFTECmd_UsnJrnl_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the MFTECmd UsnJrnl files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*J_Output.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.MFTECmd_UsnJrnl_csv_parser]
  type = "remap"
  inputs = ["MFTECmd_UsnJrnl_csv_input"]
  source = '''
    # Expect CSV header:
    # Name,Extension,EntryNumber,SequenceNumber,ParentEntryNumber,ParentSequenceNumber,UpdateSequenceNumber,UpdateTimestamp,UpdateReasons,FileAttributes,OffsetToData,SourceFile
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[UsnJrnl] Unable to split CSV: " + err, level: "error")
    }

    if fields[2] == "EntryNumber" {
      expected_header = "Name,Extension,EntryNumber,SequenceNumber,ParentEntryNumber,ParentSequenceNumber,UpdateSequenceNumber,UpdateTimestamp,UpdateReasons,FileAttributes,OffsetToData,SourceFile"
      if expected_header != .message {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header: " + string!(.message), level: "error")
      }
      abort
    }

    .name = fields[0]
    .extension = fields[1]
    .entrynumber = fields[2]
    .sequencenumber = fields[3]
    .parententrynumber = fields[4]
    .parentsequencenumber = fields[5]
    .updatesequencenumber = fields[6]
    .updatetimestamp = fields[7]
    .updatereasons = fields[8]
    .fileattributes = fields[9]
    .offsettodata = fields[10]

    .timestamp = .updatetimestamp

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_usnjrnl"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.MFTECmd_UsnJrnl_coerce_to_sink]
  type = "remap"
  inputs = ["MFTECmd_UsnJrnl_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      if (tmp_value, err = parse_timestamp(value, format: "%Y-%m-%d %H:%M:%S"); err == null) {
        tmp_value
      } else if (tmp_value, err = parse_timestamp(value, format: "%Y-%m-%d %H:%M:%S.%f"); err == null) {
        tmp_value
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

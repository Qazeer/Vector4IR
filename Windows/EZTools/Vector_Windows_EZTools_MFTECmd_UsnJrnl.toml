# Vector_Windows_EZTools_MFTECmd_UsnJrnl config.
# Description: Process Windows artefacts parsed with MFTECmd (CSV output).
#              Filename should match: "*J_Output.csv"
#              MFTECmd command: MFTECmd.exe -f %sourceFile% --csv %destinationDirectory%
#              Example command: MFTECmd.exe -f "C:\$Extend\$UsnJrnl$J" --csv <YOUR_OUTPUT> -q
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_usnjrnl & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_usnjrnl & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.MFTECmd_UsnJrnl_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the MFTECmd UsnJrnl files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*J_Output.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.MFTECmd_UsnJrnl_csv_parser]
  type = "remap"
  inputs = ["MFTECmd_UsnJrnl_csv_input"]
  source = '''
    # Expect CSV header:
    # Name,Extension,EntryNumber,SequenceNumber,ParentEntryNumber,ParentSequenceNumber,UpdateSequenceNumber,UpdateTimestamp,UpdateReasons,FileAttributes,OffsetToData,SourceFile
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[UsnJrnl] Unable to split CSV: " + err, level: "error")
    }

    if fields[2] == "EntryNumber"{
      abort
    }

    .name = fields[0]
    .extension = fields[1]
    .entrynumber = to_int!(fields[2])
    .sequencenumber = to_int!(fields[3])
    .parententrynumber = to_int!(fields[4])
    .parentsequencenumber = to_int!(fields[5])
    .updatesequencenumber = to_int!(fields[6])

    if (fields[7] != null && fields[7] != "" && fields[7] != "\r") {
         # Parse UpdateTimestamp field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
         .updatetimestamp, err = parse_timestamp(fields[7], format: "%Y-%m-%d %H:%M:%S.%f")
         if err != null {
           log("[UsnJrnl] Unable to parse UpdateTimestamp timestamp: " + err, level: "error")
         }
    }

    .updatereasons = fields[8]
    .fileattributes = fields[9]
    .offsettodata = to_int!(fields[10])
    .timestamp = .updatetimestamp

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_usnjrnl"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''


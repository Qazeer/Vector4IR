# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Vector_Windows_EZTools_RECmd_RecentDocs config.
# Description: Process Windows artefacts parsed with RECmd (CSV output).
#              Filename should match: "*RecentDocs*.csv"
#              Hive type: NTUSER
#              Registry key path: Software\Microsoft\Windows\CurrentVersion\Explorer\RecentDocs
#              RECmd command: RECmd\RECmd.exe -d %sourceDirectory% --bn RECmd\RECmd_Batch_MC.reb --nl --csv %destinationDirectory% -q
#              Example command: RECmd\RECmd.exe -d "C:\" --bn RECmd\RECmd_Batch_MC.reb --nl --csv <YOUR_OUTPUT> -q

# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_registry_explorer_recentdocs & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_registry_explorer_recentdocs & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

  [sources.RECmd_RecentDocs_csv_input]
    type = "file"
    include = ["${INPUT_FOLDER:?The input folder containing the RECmd Registry RecentDocs files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/*/Registry/*RecentDocs*.csv"]
    data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
    oldest_first = true
    fingerprint.strategy = "device_and_inode"
    max_line_bytes = 100_000_000

  [transforms.RECmd_RecentDocs_csv_parser]
    type = "remap"
    inputs = ["RECmd_RecentDocs_csv_input"]
    source = '''
    # Expect CSV header:
    # BatchKeyPath,BatchValueName,Extension,ValueName,TargetName,LnkName,MruPosition,OpenedOn,ExtensionLastOpened
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[RecentDocs] Unable to split CSV: " + err, level: "error")
    }

    if fields[0] == "BatchKeyPath"{
      abort
    }

    .extension = fields[2]
    .targetname = fields[4]
    .lnkname = fields[5]
    .mruposition = fields[6]

    if (fields[7] != null && fields[7] != "" && fields[7] != "\r") {
        # Parse OpenedOn field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
        .openedon, err = parse_timestamp(fields[7], format: "%Y-%m-%d %H:%M:%S.%f")
        if err != null {
          log("[RecentDocs] Unable to parse OpenedOn timestamp: " + err, level: "error")
        }

        .isopenedonnull = "false"
    } else {
        .isopenedonnull = "true"
    }

    if (fields[8] != null && fields[8] != "" && fields[8] != "\r") {
        # Parse ExtensionLastOpened field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
        .extensionlastopened, err = parse_timestamp(fields[8], format: "%Y-%m-%d %H:%M:%S.%f")
        if err != null {
          log("[RecentDocs] Unable to parse extensionlastopened timestamp: " + err, level: "error")
        }

        .isextensionlastopenednull = "false"
    } else {
        .isextensionlastopenednull = "true"
    }

    .timestamp = .openedon

    if (.file != null && .file != "") {
      if (contains!(.file, "_Users_")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'[a-zA-Z]_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_NTUSER.DAT.csv')."user"
      } else if (contains!(.file, "_Utilisateurs_")) {
        # Parse File field to extract username. Expected format: "username".
        .user, err = parse_regex(.file, r'[a-zA-Z]_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_NTUSER.DAT.csv')."user"
      }
    } else {
        .user = ""
    }

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_registry_explorer_recentdocs"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    '''

  # Sink to send processed logs to void, for validating that the pipeline doest not raise errors.
  # [sinks.RECmd_RecentDocs_blackhole_sink]
  #   type = "blackhole"
  #   inputs = ["RECmd_RecentDocs_csv_parser"]

  # Sink to send processed logs to the console, for debugging.
  # [sinks.RECmd_RecentDocs_console_sink]
  #   type = "console"
  #   inputs = ["RECmd_RecentDocs_csv_parser"]
  #   target = "stdout"
  #   encoding.codec = "json"

  # Sink transform to send processed logs to an ELK instance.
  [sinks.RECmd_RecentDocs_ELK_sink]
    type = "elasticsearch"
    inputs = ["RECmd_RecentDocs_csv_parser"]
    bulk.index = "${INDEX}-{{ sourcehost }}-explorer_recentdocs"
    endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
    auth.strategy = "basic"
    auth.user = "${ELK_LOGIN}"
    auth.password = "${ELK_PASSWORD}"
    suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x

  # Sink transform to send processed logs to a Splunk instance.
  # [sinks.RECmd_RecentDocs_Splunk_sink]
  #   type = "splunk_hec_logs"
  #   inputs = ["RECmd_RecentDocs_csv_parser"]
  #   endpoint = "http://${SPLUNK_IP:?Splunk IP is required}:${SPLUNK_PORT:-8088}"
  #   default_token = "${SPLUNK_HEC_TOKEN:?Splunk HEC token is required}"
  #   compression = "none"
  #   index = "${INDEX:?An index name must be specified for the ELK / Splunk index}"
  #   host_key = "host"
  #   source = "{{ source }}"
  #   sourcetype = "{{ sourcetype }}"
  #   tls.verify_certificate = false
  #   encoding.codec = "json"

# Registry Explorer\RecentDocs - end.

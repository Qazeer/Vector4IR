# Vector_Windows_EZTools_RECmd_RecentApps config.
# Description: Process Windows artefacts parsed with RECmd (CSV output).
#              Filename should match: "*RecentApps*.csv"
#              Hive type: NTUSER
#              Registry key path: Software\Microsoft\Windows\CurrentVersion\Search\RecentApps
#              RECmd command: RECmd\RECmd.exe -d %sourceDirectory% --bn RECmd\RECmd_Batch_MC.reb --nl --csv %destinationDirectory% -q
#              Example command: RECmd\RECmd.exe -d "C:\" --bn RECmd\RECmd_Batch_MC.reb --nl --csv <YOUR_OUTPUT> -q
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_registry_explorer_recentapps & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_registry_explorer_recentapps & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.RECmd_RecentApps_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the RECmd Registry RecentApps files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*RecentApps*.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.RECmd_RecentApps_csv_parser]
  type = "remap"
  inputs = ["RECmd_RecentApps_csv_input"]
  source = '''
  # Expect CSV header:
  # BatchKeyPath,BatchValueName,KeyName,AppId,AppPath,LastAccessed,LaunchCount,RecentDocs
  fields, err = parse_csv(.message, delimiter: ",")
  if err != null {
    log("[RecentApps] Unable to split CSV: " + err, level: "error")
  }

  if fields[0] == "BatchKeyPath"{
    abort
  }

  .keyname = fields[2]
  .appid = fields[3]
  .apppath = fields[4]

  if (fields[5] != null && fields[5] != "" && fields[5] != "\r") {
      # Parse LastAccessed field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
      .lastaccessed, err = parse_timestamp(fields[5], format: "%Y-%m-%d %H:%M:%S.%f")
      if err != null {
        log("[RecentApps] Unable to parse LastAccessed timestamp: " + err, level: "error")
      }

      .islastaccessednull = "false"
  } else {
      .islastaccessednull = "true"
  }

  .launchcount, err = to_int(fields[6])
  .recentdocs = fields[7]

  .timestamp = .lastaccessed

  if (.file != null && .file != "") {
    if (contains!(.file, "_Users_")) {
      # Parse File field to extract username. Expected format: "username".
      .user, err = parse_regex(.file, r'[a-zA-Z]_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_NTUSER.DAT.csv')."user"
    } else if (contains!(.file, "_Utilisateurs_")) {
      # Parse File field to extract username. Expected format: "username".
      .user, err = parse_regex(.file, r'[a-zA-Z]_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_NTUSER.DAT.csv')."user"
    }
  } else {
      .user = ""
  }

  # Add the metadata fields following the parsing.
  .sourcehost = "${SOURCE_HOST:?The source host is required}"
  .host = .sourcehost
  .source = "windows_registry_explorer_recentapps"
  .sourcetype = "windows_artefact"

  # Delete irrelevant default fields.
  del(.source_type)
  del(.file)
  del(.message)
  '''


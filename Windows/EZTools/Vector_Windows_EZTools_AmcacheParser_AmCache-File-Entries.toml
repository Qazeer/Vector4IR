# Vector_Windows_EZTools_AmcacheParser_AmCache-File-Entries config.
# Description: Process Windows artefacts parsed with AmcacheParser (CSV output).
#              Filename should match: "*Amcache_AssociatedFileEntries.csv" and "*Amcache_UnassociatedFileEntries.csv"
#              AmcacheParser command: AmcacheParser.exe -f %sourceFile% --csv %destinationDirectory% -i
#              Example command: AmcacheParser.exe -f "C:\Windows\appcompat\Programs\Amcache.hve" --csv <YOUR_OUTPUT>
#              source = "windows_amcache-associatedfileentries|windows_amcache-unassociatedfileentries" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.AmcacheParser_AmCache-File-Entries_csv_input]
  type = "file"
  include = [
    "${INPUT_FOLDER:?The input folder containing the AmcacheParser AmCache Associated File Entries files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*Amcache_AssociatedFileEntries.csv",
    "${INPUT_FOLDER:?The input folder containing the AmcacheParser AmCache Unassociated File Entries files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*Amcache_UnassociatedFileEntries.csv"
  ]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.AmcacheParser_AmCache-File-Entries_csv_parser]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-File-Entries_csv_input"]
  source = '''
    # Expect CSV header:
    # ApplicationName,ProgramId,FileKeyLastWriteTimestamp,SHA1,IsOsComponent,FullPath,Name,FileExtension,LinkDate,ProductName,Size,Version,ProductVersion,LongPathHash,BinaryType,IsPeFile,BinFileVersion,BinProductVersion,Usn,Language,Description
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[Amcache_FileEntries] Unable to split CSV: " + err, level: "error")
    }

    if fields[1] == "ProgramId" {
      expected_header = "ApplicationName,ProgramId,FileKeyLastWriteTimestamp,SHA1,IsOsComponent,FullPath,Name,FileExtension,LinkDate,ProductName,Size,Version,ProductVersion,LongPathHash,BinaryType,IsPeFile,BinFileVersion,BinProductVersion,Usn,Language,Description"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .applicationname = fields[0]
    .programid = fields[1]
    .filekeylastwritetimestamp = fields[2]
    .sha1 = fields[3]
    .isoscomponent = fields[4]
    .fullpath = fields[5]
    .name = fields[6]
    .fileextension = fields[7]
    .linkdate = fields[8]
    .productname = fields[9]
    .size = fields[10]
    .version = fields[11]
    .productversion = fields[12]
    .longpathhash = fields[13]
    .binarytype = fields[14]
    .ispefile = fields[15]
    .binfileversion = fields[16]
    .binproductversion = fields[17]
    .usn = fields[18]
    .language = fields[19]
    .description = fields[20]

    if (contains!(.file, "Amcache_AssociatedFileEntries.csv")) {
        .source = "windows_amcache-associatedfileentries"
    } else if (contains!(.file, "Amcache_UnassociatedFileEntries.csv")) {
        .source = "windows_amcache-unassociatedfileentries"
    }

    .timestamp = .filekeylastwritetimestamp

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.AmcacheParser_AmCache-File-Entries_coerce_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-File-Entries_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      if (convert_err == null && match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1]) ([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])$')) {
        tmp_value, err = parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S%z")
        if err != null {
          log("Failed to convert timestamp: " + value_string + "+00:00", level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (convert_err == null && match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1]) ([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])\.[0-9]{1,9}$')) {
        tmp_value, err = parse_timestamp(value_string + "+00:00", format: "%Y-%m-%d %H:%M:%S.%f%z")
        if err != null {
          log("Failed to convert timestamp: " + value_string + "+00:00", level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

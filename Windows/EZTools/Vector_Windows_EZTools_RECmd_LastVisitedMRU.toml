# Vector_Windows_EZTools_RECmd_LastVisitedMRU config.
# Description: Process Windows artefacts parsed with RECmd (CSV output).
#              Filename should match: "*LastVisited*.csv"
#              Hive type: NTUSER
#              Registry key path: Software\Microsoft\Windows\CurrentVersion\Explorer\ComDlg32\LastVisitedPidlMRU
#              RECmd command: RECmd\RECmd.exe -d %sourceDirectory% --bn RECmd\RECmd_Batch_MC.reb --nl --csv %destinationDirectory% -q
#              Example command: RECmd\RECmd.exe -d "C:\" --bn RECmd\RECmd_Batch_MC.reb --nl --csv <YOUR_OUTPUT> -q
#              source = "windows_registry_lastvisitedmru" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.RECmd_LastVisitedMRU_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the RECmd Registry LastVisitedMRU files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*LastVisited*.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  multiline.start_pattern = '^(BatchKeyPath|ROOT\\SOFTWARE\\Microsoft)'
  multiline.mode = "halt_before"
  multiline.condition_pattern = '^(BatchKeyPath|ROOT\\SOFTWARE\\Microsoft)'
  multiline.timeout_ms = 1000
  max_line_bytes = 100_000_000

[transforms.RECmd_LastVisitedMRU_csv_parser_to_sink]
  type = "remap"
  inputs = ["RECmd_LastVisitedMRU_csv_input"]
  source = '''
    # Expect CSV header:
    # BatchKeyPath,BatchValueName,ValueName,MruPosition,Executable,AbsolutePath,OpenedOn,Details
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[LastVisitedMRU] Unable to split CSV: " + err, level: "error")
    }

    if fields[0] == "BatchKeyPath"{
      abort
    }

    .mruposition = fields[3]
    .executable = fields[4]
    .absolutepath = fields[5]

    if (fields[6] != null && fields[6] != "" && fields[6] != "\r") {
        # Parse OpenedOn field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
        .openedon, err = parse_timestamp(fields[6], format: "%Y-%m-%d %H:%M:%S.%f")
        if err != null {
          log("[LastVisitedMRU] Unable to parse OpenedOn timestamp: " + err, level: "error")
        }
        .isopenedonnull = "false"
    } else {
        .isopenedonnull = "true"
    }

    .details = fields[7]

    .timestamp = .openedon

    if (.file != null && .file != "") {
        if (contains!(.file, "_Users_")) {
          # Parse File field to extract username. Expected format: "username".
          .user = parse_regex!(.file, r'[a-zA-Z]_Users_(?P<kapeoutputfolder>.*)_Users_(?P<user>.*)_NTUSER.DAT.csv')."user"
        } else if (contains!(.file, "_Utilisateurs_")) {
          # Parse File field to extract username. Expected format: "username".
          .user = parse_regex!(.file, r'[a-zA-Z]_Utilisateurs_(?P<kapeoutputfolder>.*)_Utilisateurs_(?P<user>.*)_NTUSER.DAT.csv')."user"
        }
    } else {
        .user = ""
    }

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_registry_lastvisitedmru"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''


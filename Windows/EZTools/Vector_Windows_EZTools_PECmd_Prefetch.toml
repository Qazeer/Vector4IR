# Vector_Windows_EZTools_PECmd_Prefetch config.
# Description: Process Windows artefacts parsed with PECmd (CSV output).
#              Filename should match: "*PECmd_Output.csv"
#              PECmd command: PECmd.exe -d %sourceDirectory% --csv %destinationDirectory% -q
#              Example command: PECmd.exe -d "C:\Windows\Prefetch" --csv <YOUR_OUTPUT> -q
#              source = "windows_prefetch" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.PECmd_Prefetch_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the PECmd Prefetch files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*PECmd_Output.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.PECmd_Prefetch_csv_parser]
  type = "remap"
  inputs = ["PECmd_Prefetch_csv_input"]
  source = '''
    # Expect CSV header:
    # Note,SourceFilename,SourceCreated,SourceModified,SourceAccessed,ExecutableName,Hash,Size,Version,RunCount,LastRun,PreviousRun0,PreviousRun1,PreviousRun2,PreviousRun3,PreviousRun4,PreviousRun5,PreviousRun6,Volume0Name,Volume0Serial,Volume0Created,Volume1Name,Volume1Serial,Volume1Created,Directories,FilesLoaded,ParsingError
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[Prefetch] Unable to split CSV: " + err, level: "error")
    }

    if fields[5] == "ExecutableName" {
      expected_header = "Note,SourceFilename,SourceCreated,SourceModified,SourceAccessed,ExecutableName,Hash,Size,Version,RunCount,LastRun,PreviousRun0,PreviousRun1,PreviousRun2,PreviousRun3,PreviousRun4,PreviousRun5,PreviousRun6,Volume0Name,Volume0Serial,Volume0Created,Volume1Name,Volume1Serial,Volume1Created,Directories,FilesLoaded,ParsingError"
      if expected_header != .message {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header: " + string!(.message), level: "error")
      }
      abort
    }

    .sourcefilename = fields[1]
    .executablename = fields[5]
    .hash = fields[6]
    .size = to_int!(fields[7])
    .version = fields[8]
    .runcount = to_int!(fields[9])

    if (fields[10] != null && fields[10] != "" && fields[10] != "\r") {
        .islastrunnull = "false"
        .lastrun = to_timestamp!(fields[10])
    } else {
        .islastrunnull = "true"
    }

    if (fields[11] != null && fields[11] != "" && fields[11] != "\r") {
        .ispreviousrun0null = "false"
        .previousrun0 = to_timestamp!(fields[11])
    } else {
        .ispreviousrun0null = "true"
    }

    if (fields[12] != null && fields[12] != "" && fields[12] != "\r") {
        .ispreviousrun1null = "false"
        .previousrun1 = to_timestamp!(fields[12])
    } else {
        .ispreviousrun1null = "true"
    }

    if (fields[13] != null && fields[13] != "" && fields[13] != "\r") {
        .ispreviousrun2null = "false"
        .previousrun2 = to_timestamp!(fields[13])
    } else {
        .ispreviousrun2null = "true"
    }

    if (fields[14] != null && fields[14] != "" && fields[14] != "\r") {
        .ispreviousrun3null = "false"
        .previousrun3 = to_timestamp!(fields[14])
    } else {
        .ispreviousrun3null = "true"
    }

    if (fields[15] != null && fields[15] != "" && fields[15] != "\r") {
        .ispreviousrun4null = "false"
        .previousrun4 = to_timestamp!(fields[15])
    } else {
        .ispreviousrun4null = "true"
    }

    if (fields[16] != null && fields[16] != "" && fields[16] != "\r") {
        .ispreviousrun5null = "false"
        .previousrun5 = to_timestamp!(fields[16])
    } else {
        .ispreviousrun5null = "true"
    }

    if (fields[17] != null && fields[17] != "" && fields[17] != "\r") {
        .ispreviousrun6null = "false"
        .previousrun6 = to_timestamp!(fields[17])
    } else {
        .ispreviousrun6null = "true"
    }

    .volume0name = fields[18]
    .volume0serial = fields[19]

    if (fields[20] != null && fields[20] != "" && fields[20] != "\r") {
      .volume0created = to_timestamp!(fields[20])
    }

    .volume1name = fields[21]
    .volume1serial = fields[22]

    if (fields[23] != null && fields[23] != "" && fields[23] != "\r") {
      .volume1created = to_timestamp!(fields[23])
    }

    .directories = fields[24]
    .filesloaded = fields[25]
    .parsingerror = fields[26]

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_prefetch"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

[transforms.PECmd_Prefetch_dedup_LastRun_to_sink]
  type = "remap"
  inputs = ["PECmd_Prefetch_csv_parser"]
  source = '''
    if !exists(.lastrun){
      abort
    }

    .timestamp = .lastrun
    .operation = "execution"
    .suboperation = "execution_lastrun"
  '''

[transforms.PECmd_Prefetch_dedup_PreviousRun0_to_sink]
  type = "remap"
  inputs = ["PECmd_Prefetch_csv_parser"]
  source = '''

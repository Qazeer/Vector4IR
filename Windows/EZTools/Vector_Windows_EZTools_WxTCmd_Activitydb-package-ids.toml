# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Vector_Windows_EZTools_WxTCmd_Activitydb-package-ids config.
# Description: Process Windows artefacts parsed with WxTCmd (CSV output).
#              Filename should match: "*_Activity_PackageIDs.csv"
#              WxTCmd command: WxTCmd.exe -f %sourceFile% --csv %destinationDirectory%
#              Example command: WxTCmd.exe -f "C:\Users\<USER>\AppData\Local\ConnectedDevicesPlatform\<FOLDER>\ActivitiesCache.db" --csv <YOUR_OUTPUT>

# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_activitydb-packageids & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_activitydb-packageids & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

  [sources.WxTCmd_Activitydb-package-ids_csv_input]
    type = "file"
    include = ["${INPUT_FOLDER:?The input folder containing the WxTCmd Activitydb Package IDs files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/*/FileFolderAccess/*_Activity_PackageIDs.csv"]
    data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
    oldest_first = true
    fingerprint.strategy = "device_and_inode"
    max_line_bytes = 100_000_000
    encoding.charset = "utf-16le"

  [transforms.WxTCmd_Activitydb-package-ids_csv_parser]
    type = "remap"
    inputs = ["WxTCmd_Activitydb-package-ids_csv_input"]
    source = '''
    # Expect CSV header:
    # Id,Platform,Name,AdditionalInformation,Expires
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[Activitydb-PackageIDs] Unable to split CSV: " + err, level: "error")
    }

    if fields[1] == "Platform"{
      abort
    }

    .id = fields[0]
    .platform = fields[1]
    .name = fields[2]
    .additionalinformation = fields[3]

    if (fields[4] != null && fields[4] != "" && fields[4] != "\r") {
      .expires, err = to_timestamp(fields[4])
      .timestamp = .expires
    }

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_activitydb-packageids"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)

    '''

  # Sink to send processed logs to void, for validating that the pipeline doest not raise errors.
  # [sinks.WxTCmd_Activitydb-package-ids_blackhole_sink]
  #   type = "blackhole"
  #   inputs = ["WxTCmd_Activitydb-package-ids_csv_parser"]

  # Sink to send processed logs to the console, for debugging.
  # [sinks.WxTCmd_Activitydb-package-ids_console_sink]
  #   type = "console"
  #   inputs = ["WxTCmd_Activitydb-package-ids_csv_parser"]
  #   target = "stdout"
  #   encoding.codec = "json"

  # Sink transform to send processed logs to an ELK instance.
  [sinks.WxTCmd_Activitydb-package-ids_ELK_sink]
    type = "elasticsearch"
    inputs = ["WxTCmd_Activitydb-package-ids_csv_parser"]
    bulk.index = "${INDEX}-{{ sourcehost }}-activitydb-packageids"
    endpoint = "http://${ELK_IP:?ELK IP is required}:${ELK_PORT:-9200}"
    auth.strategy = "basic"
    auth.user = "${ELK_LOGIN}"
    auth.password = "${ELK_PASSWORD}"
    suppress_type_name = true # type field in header is deprecated since ELK 7.x and has been removed from ELK 8.x

  # Sink transform to send processed logs to a Splunk instance.
  # [sinks.WxTCmd_Activitydb-package-ids_Splunk_sink]
  #   type = "splunk_hec_logs"
  #   inputs = ["WxTCmd_Activitydb-package-ids_csv_parser"]
  #   endpoint = "http://${SPLUNK_IP:?Splunk IP is required}:${SPLUNK_PORT:-8088}"
  #   default_token = "${SPLUNK_HEC_TOKEN:?Splunk HEC token is required}"
  #   compression = "none"
  #   index = "${INDEX:?An index name must be specified for the ELK / Splunk index}"
  #   host_key = "host"
  #   source = "{{ source }}"
  #   sourcetype = "{{ sourcetype }}"
  #   tls.verify_certificate = false
  #   encoding.codec = "json"

# Activity.db PackageIDs - end.

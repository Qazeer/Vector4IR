# Vector_Windows_EZTools_RBCmd_RecycleBin config.
# Description: Process Windows artefacts parsed with RBCmd (CSV output).
#              Filename should match: "*PECmd_Output_Timeline.csv"
#              RBCmd command: RBCmd.exe -d %sourceDirectory% --csv %destinationDirectory% -q
#              Example command: RBCmd.exe -d "C:\ --csv <YOUR_OUTPUT> -q
#              source = "windows_recyclebin" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.RBCmd_RecycleBin_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the RBCmd Registry RecycleBin files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*_RBCmd_Output.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.RBCmd_RecycleBin_csv_parser_to_sink]
  type = "remap"
  inputs = ["RBCmd_RecycleBin_csv_input"]
  source = '''
    # Expect CSV header:
    # SourceName,FileType,FileName,FileSize,DeletedOn
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("[RecycleBin] Unable to split CSV: " + err, level: "error")
    }

    if fields[0] == "SourceName"{
      abort
    }

    .sourcename = fields[0]
    .filetype = fields[1]
    .filename = fields[2]
    .filesize = to_int!(fields[3])

    if (fields[4] != null && fields[4] != "" && fields[4] != "\r") {
        # Parse DeletedOn field to extract timestamp. Input format: YYYY-MM-DD hh:mm:ss.zzz. Expected format: YYYY-MM-DD hh:mm:ss.
        .deletedon, err = parse_timestamp(fields[4], format: "%Y-%m-%d %H:%M:%S.%f")
        if err != null {
          log("[RecycleBin] Unable to parse DeletedOn timestamp: " + err, level: "error")
        }
    }

    .timestamp = .deletedon
    # Parse SourceName field to extract user SID. Expected format: S-1-5-1234567890-123456789-1234567890-512.
    .user_sid = parse_regex!(.sourcename, r'\$$Recycle.Bin\\(?P<sid>.*)\\')."sid"

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .source = "windows_recyclebin"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
  '''

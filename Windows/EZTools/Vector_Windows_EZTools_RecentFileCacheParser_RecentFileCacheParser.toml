# Vector_Windows_EZTools_RecentFileCacheParser_RecentFileCacheParser config.
# Description: Process Windows artefacts parsed with RecentFileCacheParser (CSV output).
#              Filename should match: "*_RecentFileCacheParser_*.csv"
#              WxTCmd command: RecentFileCacheParser.exe -f %sourceFile% --csv %destinationDirectory%
#              Example command: RecentFileCacheParser.exe -f "C:\Windows\AppCompat\Programs\RecentFileCache.bcf" --csv <YOUR_OUTPUT>
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_recentfilecacheparser & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_recentfilecacheparser & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.RecentFileCacheParser_RecentFileCacheParser_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER}/**/*_RecentFileCacheParser_*.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.RecentFileCacheParser_RecentFileCacheParser_csv_parser]
  type = "remap"
  inputs = ["RecentFileCacheParser_RecentFileCacheParser_csv_input"]
  source = '''
  # Expect CSV header:
  # SourceFile,SourceCreated,SourceModified,SourceAccessed,Filename
  fields, err = parse_csv(.message, delimiter: ",")
  if err != null {
    log("[RecentFileCacheParser] Unable to split CSV: " + err, level: "error")
  }

  if fields[0] == "SourceFile"{
    abort
  }

  .sourcefile = fields[0]
  .sourcecreated, err = to_timestamp(fields[1])
  .sourcemodified, err = to_timestamp(fields[2])
  .sourceaccessed, err = to_timestamp(fields[3])
  .filename = fields[4]

  if (.filename != null && .filename != "") {
    if (contains(.filename, "users")) {
      # Parse Filename field to extract username. Expected format: "username".
      .user, err = parse_regex(.filename, r'[a-zA-Z]:\\users\\(?P<user>[\w]+)\\*')."user"
    } else if (contains(.filename, "utilisateurs")) {
      # Parse Filename field to extract username. Expected format: "username".
      .user, err = parse_regex(.filename, r'[a-zA-Z]:\\utilisateurs\\(?P<user>[\w]+)\\*')."user"
    }
  } else {
      .user = ""
  }

  # Add the metadata fields following the parsing.
  .sourcehost = "${SOURCE_HOST:?The source host is required}"
  .host = .sourcehost
  .source = "windows_recentfilecacheparser"
  .sourcetype = "windows_artefact"

  # Delete irrelevant default fields.
  del(.source_type)
  del(.file)
  del(.message)
  '''

[transforms.RecentFileCacheParser_RecentFileCacheParser_dedup_SourceCreated]
  type = "remap"
  inputs = ["RecentFileCacheParser_RecentFileCacheParser_csv_parser"]
  source = '''
  if !exists(.sourcecreated){
    abort
  }

  .timestamp = .sourcecreated
  .operation = "creation"
  .suboperation = "file_creation_sourcecreated"
  '''

[transforms.RecentFileCacheParser_RecentFileCacheParser_dedup_SourceModified]
  type = "remap"
  inputs = ["RecentFileCacheParser_RecentFileCacheParser_csv_parser"]
  source = '''
  if !exists(.sourcemodified){
    abort
  }

  .timestamp = .sourcemodified
  .operation = "modification"
  .suboperation = "file_modification_sourcemodified"
  '''

  [transforms.RecentFileCacheParser_RecentFileCacheParser_dedup_SourceAccessed]
    type = "remap"
    inputs = ["RecentFileCacheParser_RecentFileCacheParser_csv_parser"]
    source = '''
    if !exists(.sourceaccessed){
      abort
    }

    .timestamp = .sourceaccessed
    .operation = "access"
    .suboperation = "file_access_sourceaccessed"
    '''


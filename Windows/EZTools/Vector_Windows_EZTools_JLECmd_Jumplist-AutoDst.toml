# Vector_Windows_EZTools_JLECmd_Jumplist-AutoDst config.
# Description: Process Windows artefacts parsed with JLECmd (CSV output).
#              Filename should match: "*AutomaticDestinations.csv"
#              JLECmd command: JLECmd.exe -d %sourceDirectory% --csv %destinationDirectory% -q
#              Example command: JLECmd.exe -d "C:\" --csv <YOUR_OUTPUT> -q
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_HOST = "<SOURCE_HOST>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = windows_jumplist-autodst & sourcetype = windows_artefact (windows_event pour evtx).
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = windows_jumplist-autodst & sourcetype = windows_artefact (windows_event pour evtx).
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.JLECmd_Jumplist-AutoDst_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the JLECmd Jumplist Automatic Destinations files is required. Add '**' to process the specified folder recursively (example: \"C:\\logs\" or folder \"C:\\logs\\**\")}/**/*AutomaticDestinations.csv"]
  data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.JLECmd_Jumplist-AutoDst_csv_parser]
  type = "remap"
  inputs = ["JLECmd_Jumplist-AutoDst_csv_input"]
  source = '''
  # Expect CSV header:
  # SourceFile,SourceCreated,SourceModified,SourceAccessed,AppId,AppIdDescription,DestListVersion,LastUsedEntryNumber,MRU,EntryNumber,CreationTime,LastModified,Hostname,MacAddress,Path,InteractionCount,PinStatus,FileBirthDroid,FileDroid,VolumeBirthDroid,VolumeDroid,TargetCreated,TargetModified,TargetAccessed,FileSize,RelativePath,WorkingDirectory,FileAttributes,HeaderFlags,DriveType,VolumeSerialNumber,VolumeLabel,LocalPath,CommonPath,TargetIDAbsolutePath,TargetMFTEntryNumber,TargetMFTSequenceNumber,MachineID,MachineMACAddress,TrackerCreatedOn,ExtraBlocksPresent,Arguments,Notes
  fields, err = parse_csv(.message, delimiter: ",")
  if err != null {
    log("[Jumplist-AutoDst] Unable to split CSV: " + err, level: "error")
  }

  if fields[22] == "TargetModified"{
    abort
  }

  .sourcefile = fields[0]

  if (fields[1] != null && fields[1] != "" && fields[1] != "\r") {
    .sourcecreated, err = to_timestamp(fields[1])
  }

  if (fields[2] != null && fields[2] != "" && fields[2] != "\r") {
    .sourcemodified, err = to_timestamp(fields[2])
  }

  if (fields[3] != null && fields[3] != "" && fields[3] != "\r") {
    .sourceaccessed, err = to_timestamp(fields[3])
  }

  .appid = fields[4]
  .appiddescription = fields[5]
  .lastusedentrynumber = fields[7]
  .mru, err = to_int(fields[8])
  .entrynumber, err = to_int(fields[9])

  if (fields[10] != null && fields[10] != "" && fields[10] != "\r") {
    .creationtime, err = to_timestamp(fields[10])
  }

  if (fields[11] != "1601-01-01 00:00:00") {
      .lastmodified, err = to_timestamp(fields[11])
  }

  .hostname = fields[12]
  .macaddress = fields[13]
  .path = fields[14]
  .interactioncount, err = to_int(fields[15])
  .pinstatus, err = to_bool(fields[16])

  if (fields[21] != null && fields[21] != "" && fields[21] != "\r") {
    .targetcreated, err = to_timestamp(fields[21])
  }

  if (fields[22] != null && fields[22] != "" && fields[22] != "\r") {
    .targetmodified, err = to_timestamp(fields[22])
  }

  if (fields[23] != null && fields[23] != "" && fields[23] != "\r") {
    .targetaccessed, err = to_timestamp(fields[23])
  }

  .filesize, err = to_int(fields[24])
  .relativepath = fields[25]
  .workingdirectory = fields[26]
  .fileattributes = fields[27]
  .headerflags = fields[28]
  .drivetype = fields[29]
  .volumeserialnumber = fields[30]
  .volumelabel = fields[31]
  .localpath = fields[32]
  .commonpath = fields[33]
  .targetidabsolutepath = fields[34]
  .targetmftentrynumber = fields[35]
  .machineid = fields[37]
  .machinemacaddress = fields[38]

  if (fields[39] != null && fields[39] != "" && fields[39] != "\r") {
    .trackercreatedon, err = to_timestamp(fields[39])
  }

  .arguments = fields[41]

  .timestamp = .lastmodified

  if (fields[0] != null && fields[0] != "" && fields[0] != "\r") {
    if ((parse_regex!(fields[0], r'[a-zA-Z]\\Users\\(?P<user>.*)\\AppData\\Roaming\\Microsoft\\Windows\\Recent*')."user") != null) {
      # Parse SourceFile field to extract username. Expected format: "username".
      .user, err = parse_regex(fields[0], r'[a-zA-Z]\\Users\\(?P<user>.*)\\AppData\\Roaming\\Microsoft\\Windows\\Recent*')."user"
    } else if ((parse_regex!(fields[0], r'[a-zA-Z]\\Utilisateurs\\(?P<user>.*)\\AppData\\Roaming\\Microsoft\\Windows\\Recent*')."user") != null) {
      # Parse SourceFile field to extract username. Expected format: "username".
      .user, err = parse_regex(fields[0], r'[a-zA-Z]\\Utilisateurs\\(?P<user>.*)\\AppData\\Roaming\\Microsoft\\Windows\\Recent*')."user"
    }
  } else {
      .user = ""
  }

  # Add the metadata fields following the parsing.
  .sourcehost = "${SOURCE_HOST:?The source host is required}"
  .host = .sourcehost
  .source = "windows_jumplist-autodst"
  .sourcetype = "windows_artefact"

  # Delete irrelevant default fields.
  del(.source_type)
  del(.file)
  del(.message)
  '''

[transforms.JLECmd_Jumplist-AutoDst_dedup_LastModified]
  type = "remap"
  inputs = ["JLECmd_Jumplist-AutoDst_csv_parser"]
  source = '''
  if !exists(.lastmodified){
    abort
  }

  .timestamp = .lastmodified
  .operation = "modification"
  .suboperation = "file_modification_lastmodified"
    '''

[transforms.JLECmd_Jumplist-AutoDst_dedup_SourceCreated]
  type = "remap"
  inputs = ["JLECmd_Jumplist-AutoDst_csv_parser"]
  source = '''

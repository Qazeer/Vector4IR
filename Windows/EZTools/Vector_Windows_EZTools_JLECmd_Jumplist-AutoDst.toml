[sinks.JLECmd_Jumplist-AutoDst_console_sink]
  type = "console"
  inputs = [
    "JLECmd_Jumplist-AutoDst_dedup_LastModified",
    "JLECmd_Jumplist-AutoDst_dedup_SourceCreated",
    "JLECmd_Jumplist-AutoDst_dedup_SourceModified",
    "JLECmd_Jumplist-AutoDst_dedup_SourceAccessed",
    "JLECmd_Jumplist-AutoDst_dedup_CreationTime",
    "JLECmd_Jumplist-AutoDst_dedup_TargetCreated",
    "JLECmd_Jumplist-AutoDst_dedup_TargetModified",
    "JLECmd_Jumplist-AutoDst_dedup_TargetAccessed",
    "JLECmd_Jumplist-AutoDst_dedup_TrackerCreatedOn"
  ]
  target = "stdout"
  encoding.codec = "json"


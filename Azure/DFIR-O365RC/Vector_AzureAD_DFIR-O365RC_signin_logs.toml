# Description: Process AzureAD Sign Logs, as retrieved by DFIR-ORC365RC.
#              Filename should match: "**\*AADSigninLog*.json"
#              Logs should be converted from pretty-printed JSON to compacted JSON using the Onelifying_JSON.sh script (requiring jq).
# Author(s): Axel ROC, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-01
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_TENANT = "<SOURCE_TENANT>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = "azuread_signin" & sourcetype = "azure_artefact".
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = "azuread_signin" & sourcetype = "azure_artefact".
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

# Temporary folder used by Vector
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.AzureAD_DFIR-O365RC_signin_logs_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The source folder containing the DFIR-O365RC JSON outputs is required}\\**\\*AADSigninLog*.json"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

# Double remap as events are stored as JSON objects in a single-line JSON array.
# The first remap "explode" the JSON array in multiple events.
[transforms.AzureAD_DFIR-O365RC_signin_logs_parser]
  inputs = ["AzureAD_DFIR-O365RC_signin_logs_input"]
  type = "remap"
  source = '''
  ., err = parse_json(.message)
  if err != null {
    log("Unable to parse JSON: " + err, level: "error")
  }
  '''

[transforms.AzureAD_DFIR-O365RC_signin_logs_enrich]
  inputs = ["AzureAD_DFIR-O365RC_signin_logs_parser"]
  type = "remap"
  source = '''
  if is_null(.createdDateTime) == false {
    .createdDateTime, err1 = to_timestamp(.createdDateTime)
    if err1 != null {
      log("Unable to convert to timestamp: " + err1, level: "error")
    }
  }
  
  if (.status.errorCode == 0 && .status.failureReason == "Other."){
    .authenticationResult = "Success"
  } else {
    .authenticationResult = "Failure"
  }

  # Add new fields copied from existing ones to have the same nomenclature between the different log sources (audit, signins, unified logs...)
  .timestamp = .createdDateTime
  .ClientIP = .ipAddress
  .Username = .userDisplayName
  .AccountName = .userPrincipalName
  
  .host = "${SOURCE_TENANT:?The source AzureAD tenant is required}"
  .source = "azuread_signin"
  .sourcetype = "azure_artefact"

  . = flatten(.)
  '''


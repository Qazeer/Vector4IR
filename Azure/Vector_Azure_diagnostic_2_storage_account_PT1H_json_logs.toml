# Description: Process logs exported from Azure Diagnostic settings to a storage accounts.
#              The following sources, identified from their default export folder, are parsed:
#                 - AAD Tenant - audit logs - folder: insights-logs-auditlogs  
#                 - AAD Tenant - signins - folders: insights-activity-logs  
#                 - Subscription - activity logs - folder: insights-activity-logs  
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-12-13
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   INDEX = "<INDEX>"
#   SOURCE_TENANT = "<SOURCE_TENANT>"
#   -- ELK sink specific variables. ELK index = <INDEX> & source = "azure_insights_logs" & sourcetype = "azure_artefact".
#   ELK_IP = "<IP>"
#   ELK_PORT = "<PORT>" -- ELK bulk HTTP API port. Defaults to 9200.
#   ELK_USERNAME = "<USERNAME>"
#   ELK_PASSWORD = "<PASSWORD>"
#   -- Splunk sink specific variables. Splunk index = <INDEX> & source = "azure_insights_logs" & sourcetype = "azure_artefact".
#   SPLUNK_IP = "<IP>"
#   SPLUNK_PORT = "<PORT>" -- Splunk HTTP Event Collector port. Defaults to 8088.
#   SPLUNK_HEC_TOKEN = "<SPLUNK_HEC_TOKEN>" -- Splunk HEC token: https://docs.splunk.com/Documentation/Splunk/9.0.1/Data/UsetheHTTPEventCollector.

data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

[sources.Azure_Insights_logs_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The source folder containing the Insights JSON logs is required}/**/PT1H.json"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = true
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000

[transforms.Azure_Insights_logs_parser]
  inputs = ["Azure_Insights_logs_input"]
  type = "remap"
  source = '''
    splitted, err = split(.message, "\n")
    if err != null {
      log("Unable to split message on newlines: " + err, level: "error")
    }

    . = flatten(map_values(splitted) -> |value| {
      parsed_value, err = parse_json(value)
      if err != null {
        log("Unable to parse JSON: " + err, level: "error")
        null
      } else {
        parsed_value
      }
    })
  '''

[transforms.Azure_Insights_logs_enrich]
  inputs = ["Azure_Insights_logs_parser"]
  type = "remap"
  source = '''
    .timestamp, err = parse_timestamp(.time, format: "%+")
    if err != null {
      log("Unable to convert to timestamp: " + err, level: "error")
    }

    .host = "${SOURCE_TENANT:?The source AzureAD tenant is required}"
    .source = "azure_insights_logs"
    .sourcetype = "azure_artefact"
  '''

# Sink to send processed logs to void, for validating that the pipeline doest not raise errors.
[sinks.Azure_Insights_logs_blackhole_sink]
  type = "blackhole"
  inputs = ["Azure_Insights_logs_enrich"]

